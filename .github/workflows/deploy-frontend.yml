name: Deploy Frontend (reusable)

# CI-modernization Phase 2.1+2.2 (ci_modernization/docs/MODERNIZATION_PLAN.md).
# One reusable deploy unit for all S3/CloudFront front-ends (analytics
# dashboard, config builder, widget). DEPLOY MECHANICS ONLY — quality gates
# (lint/test/build) stay in each caller repo, which builds and uploads its
# bundle as an artifact, then calls this with the artifact name.
#
# What it does, in order:
#   1. download the caller's build artifact
#   2. (production) upload an immutable copy to s3://<bucket>/releases/<sha>/
#      — the one-step rollback unit: re-sync a prior release prefix to live
#   3. sync the bundle to the live bucket root
#   4. invalidate CloudFront (when a distribution id is supplied)
#   5. smoke the public URL (Cache-Control: no-cache)
#   6. (staging, PR context) comment the staging URL on the PR
#   7. write a summary including the exact rollback command
#
# Callers pin `@main` of this (public) repo — acceptable single-operator
# supply chain; pin a SHA if that ever changes.

on:
  workflow_call:
    inputs:
      environment:
        description: staging | production (labels + behavior switches)
        type: string
        required: true
      artifact_name:
        description: Name of the uploaded build artifact containing the bundle
        type: string
        required: true
      bucket:
        description: Target S3 bucket name (no s3:// prefix)
        type: string
        required: true
      cloudfront_distribution_id:
        description: CloudFront distribution to invalidate (empty = skip — e.g. S3 website endpoints)
        type: string
        required: false
        default: ''
      website_url:
        description: Public base URL used for the smoke check and PR comment
        type: string
        required: true
      smoke_path:
        description: Path appended to website_url for the smoke check
        type: string
        required: false
        default: '/'
      smoke_expect_status:
        description: Expected HTTP status from the smoke check
        type: string
        required: false
        default: '200'
      sync_exclude:
        description: Optional space-separated patterns excluded from the live sync AND protected from --delete (e.g. "collateral/* tenants/*")
        type: string
        required: false
        default: ''
      cache_control:
        description: Cache-Control applied to the live sync (empty = none; e.g. "public, max-age=31536000, immutable")
        type: string
        required: false
        default: ''
      short_cache_paths:
        description: Space-separated keys re-uploaded after the sync with short_cache_control — entry points whose URLs carry no content hash, so they must not inherit a long cache_control (e.g. "widget.js iframe.html")
        type: string
        required: false
        default: ''
      short_cache_control:
        description: Cache-Control for short_cache_paths
        type: string
        required: false
        default: 'public, max-age=300, must-revalidate'
      comment_pr:
        description: Post the deployed URL as a PR comment (staging-on-PR flows)
        type: boolean
        required: false
        default: false
    secrets:
      deploy_role_arn:
        description: IAM role the deploy assumes (per-product, least-privilege)
        required: true

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }} (${{ inputs.bucket }})
    runs-on: ubuntu-latest
    # NO permissions block — the job inherits exactly what the CALLER job
    # grants. A called job that requests MORE than its caller granted is a
    # whole-workflow startup_failure (zero jobs, no error surfaced via the
    # API) — this killed the pcb post-merge run when its prod caller granted
    # only id-token+contents while this job demanded pull-requests:write.
    #
    # CALLER CONTRACT — grant on the calling job:
    #   id-token: write        (always — OIDC role assumption)
    #   contents: read         (always — artifact download)
    #   pull-requests: write   (only when comment_pr: true)
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.deploy_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      # Identify the PREVIOUS release before archiving the current one —
      # it's the auto-rollback target and the release-notes baseline.
      # Newest distinct releases/<sha>/ prefix by object LastModified,
      # excluding the current sha (re-deploys of the same sha).
      - name: Find previous release (production)
        id: prev
        if: inputs.environment == 'production'
        # Inputs reach the shell via env, never inline interpolation
        # (uniform rule since lambda run 27248430578; extended to ALL
        # inputs by the Phase-2 audit, finding D6).
        env:
          BUCKET: ${{ inputs.bucket }}
          CUR_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          PREV_SHA=$(aws s3api list-objects-v2 --bucket "$BUCKET" --prefix "releases/" \
            --query 'Contents[].{k:Key,t:LastModified}' --output json 2>/dev/null \
            | jq -r --arg cur "$CUR_SHA" '
                [ (. // [])[] | {sha: (.k | split("/")[1]), t} ]
                | map(select(.sha != $cur and .sha != ""))
                | group_by(.sha) | map({sha: .[0].sha, t: (map(.t) | max)})
                | sort_by(.t) | last | .sha // empty')
          echo "prev_sha=$PREV_SHA" >> "$GITHUB_OUTPUT"
          echo "Previous release: ${PREV_SHA:-<none — first release>}"

      - name: Upload immutable release copy (production)
        if: inputs.environment == 'production'
        # Archive carries the same bulk Cache-Control as the live sync
        # (audit D3): rollback re-syncs S3→S3, which preserves source-object
        # metadata — without this, rolled-back bulk assets serve headerless.
        env:
          BUCKET: ${{ inputs.bucket }}
          CUR_SHA: ${{ github.sha }}
          CACHE_CONTROL: ${{ inputs.cache_control }}
        run: |
          set -euo pipefail
          EXTRA=()
          if [ -n "$CACHE_CONTROL" ]; then
            EXTRA+=(--cache-control "$CACHE_CONTROL")
          fi
          aws s3 sync dist/ "s3://$BUCKET/releases/$CUR_SHA/" ${EXTRA[@]+"${EXTRA[@]}"}
          echo "Release archived: s3://$BUCKET/releases/$CUR_SHA/"

      - name: Sync to live
        # sync_exclude reaches the shell via env, not inline interpolation
        # (uniform rule since lambda run 27248430578 — even caller-YAML
        # inputs get the safe path).
        env:
          BUCKET: ${{ inputs.bucket }}
          SYNC_EXCLUDE: ${{ inputs.sync_exclude }}
          CACHE_CONTROL: ${{ inputs.cache_control }}
          SHORT_CACHE_PATHS: ${{ inputs.short_cache_paths }}
          SHORT_CACHE_CONTROL: ${{ inputs.short_cache_control }}
        run: |
          set -euo pipefail
          EXCLUDES=()
          # releases/ holds the immutable rollback copies — never let the
          # live sync's --delete reap them.
          EXCLUDES+=(--exclude "releases/*")
          for pat in $SYNC_EXCLUDE; do
            EXCLUDES+=(--exclude "$pat")
          done
          # Entry points get their own short Cache-Control below — exclude
          # them from the bulk sync so they never carry the long value.
          for key in $SHORT_CACHE_PATHS; do
            EXCLUDES+=(--exclude "$key")
          done
          EXTRA=()
          if [ -n "$CACHE_CONTROL" ]; then
            EXTRA+=(--cache-control "$CACHE_CONTROL")
          fi
          aws s3 sync dist/ "s3://$BUCKET/" --delete "${EXCLUDES[@]}" ${EXTRA[@]+"${EXTRA[@]}"}
          for key in $SHORT_CACHE_PATHS; do
            aws s3 cp "dist/$key" "s3://$BUCKET/$key" \
              --cache-control "$SHORT_CACHE_CONTROL"
          done

      - name: Invalidate CloudFront
        if: inputs.cloudfront_distribution_id != ''
        env:
          CF_DIST: ${{ inputs.cloudfront_distribution_id }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CF_DIST" \
            --paths '/*'

      - name: Smoke check
        id: smoke
        # Retried (audit D2): a single unretried curl can false-fail on a
        # CDN transient and — on production — trigger a SPURIOUS auto-
        # rollback of a healthy deploy (the lambda#275 failure class).
        # Budget 6×10s; a failure after that is genuine and the rollback
        # step is correct to act on it.
        env:
          WEBSITE_URL: ${{ inputs.website_url }}
          SMOKE_PATH: ${{ inputs.smoke_path }}
          SMOKE_EXPECT: ${{ inputs.smoke_expect_status }}
        run: |
          set -euo pipefail
          URL="${WEBSITE_URL}${SMOKE_PATH}"
          STATUS=""
          for attempt in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' -H 'Cache-Control: no-cache' "$URL")
            echo "Smoke attempt $attempt: GET $URL -> $STATUS (expect $SMOKE_EXPECT)"
            [ "$STATUS" = "$SMOKE_EXPECT" ] && break
            sleep 10
          done
          if [ "$STATUS" != "$SMOKE_EXPECT" ]; then
            echo "::error::Expected $SMOKE_EXPECT, got $STATUS after 6 attempts (1m)"
            exit 1
          fi

      # Phase 4.3: a failed prod smoke self-heals by re-syncing the previous
      # release prefix — the operator approves agent work knowing a bad deploy
      # reverts itself. Skipped on the first-ever release (no rollback target)
      # and on staging (fast-forward fixes are cheaper there than rollbacks).
      - name: Auto-rollback on failed smoke (production)
        if: failure() && steps.smoke.outcome == 'failure' && inputs.environment == 'production' && steps.prev.outputs.prev_sha != ''
        env:
          BUCKET: ${{ inputs.bucket }}
          CF_DIST: ${{ inputs.cloudfront_distribution_id }}
          WEBSITE_URL: ${{ inputs.website_url }}
          SMOKE_PATH: ${{ inputs.smoke_path }}
          SMOKE_EXPECT: ${{ inputs.smoke_expect_status }}
          CUR_SHA: ${{ github.sha }}
          SYNC_EXCLUDE: ${{ inputs.sync_exclude }}
          CACHE_CONTROL: ${{ inputs.cache_control }}
          SHORT_CACHE_PATHS: ${{ inputs.short_cache_paths }}
          SHORT_CACHE_CONTROL: ${{ inputs.short_cache_control }}
          PREV_SHA: ${{ steps.prev.outputs.prev_sha }}
        run: |
          set -euo pipefail
          echo "::warning::Smoke failed — rolling live back to release $PREV_SHA"
          # Download-then-upload. NEVER `aws s3 sync` S3→S3 here: with an S3
          # source under releases/, the `--exclude releases/*` needed to
          # protect the dest archive ALSO poisons the --delete comparison
          # manifest (source keys evaluate with their full releases/<sha>/…
          # path), so every live object looks source-absent and is DELETED
          # while nothing copies — a total live-bucket wipe. Dryrun-confirmed
          # against the real prod bucket during the 2026-06-12 rollback
          # rehearsal incident (Phase-2 audit finding D10; ~6-min partial
          # widget outage, recovered from versioning + build artifact).
          # A LOCAL source's keys are prefix-relative, so the exclude only
          # protects the dest archive — the proven shape of the deploy sync.
          rm -rf /tmp/rollback && mkdir /tmp/rollback
          aws s3 cp "s3://$BUCKET/releases/$PREV_SHA/" /tmp/rollback/ --recursive --no-progress | tail -1
          # Fail-safe (D10): NEVER run a --delete sync from an empty source.
          # If the release prefix downloaded empty (wrong sha, listing
          # failure, partial archive), syncing it with --delete would wipe
          # the live bucket — abort and leave live as-is instead.
          FILE_COUNT=$(find /tmp/rollback -type f | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::Rollback ABORTED — release prefix releases/$PREV_SHA/ downloaded EMPTY; refusing to --delete-sync an empty source against the live bucket"
            exit 1
          fi
          echo "Rollback source: $FILE_COUNT files"
          EXCLUDES=(--exclude "releases/*")
          for pat in $SYNC_EXCLUDE; do EXCLUDES+=(--exclude "$pat"); done
          # Entry points re-cp'd below with the short Cache-Control — keep
          # them out of the bulk sync (mirrors the deploy step).
          for key in $SHORT_CACHE_PATHS; do EXCLUDES+=(--exclude "$key"); done
          EXTRA=()
          if [ -n "$CACHE_CONTROL" ]; then
            EXTRA+=(--cache-control "$CACHE_CONTROL")
          fi
          aws s3 sync /tmp/rollback/ "s3://$BUCKET/" --delete "${EXCLUDES[@]}" ${EXTRA[@]+"${EXTRA[@]}"}
          for key in $SHORT_CACHE_PATHS; do
            aws s3 cp "/tmp/rollback/$key" "s3://$BUCKET/$key" \
              --cache-control "$SHORT_CACHE_CONTROL"
          done
          if [ -n "$CF_DIST" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CF_DIST" --paths '/*'
          fi
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -H 'Cache-Control: no-cache' "${WEBSITE_URL}${SMOKE_PATH}")
          {
            echo "### ⚠️ AUTO-ROLLBACK executed"
            echo ""
            echo "Smoke failed on \`$CUR_SHA\`; live re-synced to previous release \`$PREV_SHA\`."
            echo "Post-rollback smoke: \`$STATUS\` (expected $SMOKE_EXPECT)."
            echo "The failed release remains archived at \`s3://$BUCKET/releases/$CUR_SHA/\` for diagnosis."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment deployed URL on PR
        if: inputs.comment_pr && github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${{ inputs.environment }} deployed\n\nTest at: **${{ inputs.website_url }}**\n\nAll quality gates passed. Merge when verification is complete.`
            })

      - name: Summary
        if: always()
        env:
          SYNC_EXCLUDE: ${{ inputs.sync_exclude }}
          CF_ID: ${{ inputs.cloudfront_distribution_id }}
          SHORT_CACHE_PATHS: ${{ inputs.short_cache_paths }}
          SHORT_CACHE_CONTROL: ${{ inputs.short_cache_control }}
          PREV_SHA: ${{ steps.prev.outputs.prev_sha }}
          # Phase 4.2 release notes: compare API instead of a checkout — a
          # checkout here would wipe dist/, and contents:read (already in the
          # caller contract) covers the compare endpoint.
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "### Deploy: ${{ inputs.environment }} -> ${{ inputs.bucket }}"
            echo ""
            echo "- **Commit:** ${{ github.sha }}"
            echo "- **URL:** ${{ inputs.website_url }}"
            if [ "${{ inputs.environment }}" = "production" ] && [ -n "$PREV_SHA" ]; then
              echo ""
              echo "**Changes since previous release (\`${PREV_SHA:0:7}\`):**"
              # Unrelated/garbage-collected prev sha -> compare 404s; degrade
              # to a note rather than failing the summary.
              gh api "repos/${{ github.repository }}/compare/$PREV_SHA...${{ github.sha }}" \
                --jq '.commits[] | "- \(.sha[0:7]) \(.commit.message | split("\n")[0])"' 2>/dev/null \
                | tail -50 || echo "_(commit range unavailable — previous release predates current history)_"
            fi
            if [ "${{ inputs.environment }}" = "production" ]; then
              echo "- **Release copy:** \`s3://${{ inputs.bucket }}/releases/${{ github.sha }}/\` (immutable)"
              echo ""
              echo "Rollback (one step; pick a prior release with \`aws s3 ls s3://${{ inputs.bucket }}/releases/\`):"
              echo '```bash'
              CMD="aws s3 sync s3://${{ inputs.bucket }}/releases/<prior-sha>/ s3://${{ inputs.bucket }}/ --delete --exclude 'releases/*'"
              for pat in $SYNC_EXCLUDE; do
                CMD="$CMD --exclude '$pat'"
              done
              echo "$CMD"
              # Entry points need their short Cache-Control restored — the
              # release copy carries no Cache-Control metadata.
              for key in $SHORT_CACHE_PATHS; do
                echo "aws s3 cp s3://${{ inputs.bucket }}/releases/<prior-sha>/$key s3://${{ inputs.bucket }}/$key --cache-control '$SHORT_CACHE_CONTROL'"
              done
              if [ -n "$CF_ID" ]; then
                echo "aws cloudfront create-invalidation --distribution-id $CF_ID --paths '/*'"
              fi
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
