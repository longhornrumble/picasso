name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      invalidate_cache:
        description: 'Invalidate CloudFront cache after deployment'
        required: false
        type: boolean
        default: false
      skip_staging:
        description: 'Skip staging and deploy directly to production (hotfix only)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '22'
  AWS_REGION: 'us-east-1'
  S3_BUCKET_PRODUCTION: 's3://picassocode/'
  S3_BUCKET_STAGING: 's3://picassostaging/'
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
  CLOUDFRONT_STAGING_ID: ${{ secrets.CLOUDFRONT_STAGING_DISTRIBUTION_ID }}

jobs:
  lint:
    name: Code Quality - Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Run linting
        working-directory: ./Picasso
        run: npm run lint

      - name: Upload lint results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: Picasso/eslint-report.json
          retention-days: 7

  typecheck:
    name: Code Quality - Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Run type checking
        working-directory: ./Picasso
        run: npm run typecheck

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Run tests
        working-directory: ./Picasso
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./Picasso/coverage/lcov.info
          flags: frontend
          name: picasso-frontend

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            Picasso/coverage/
            Picasso/test-results.xml
          retention-days: 30

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout Lambda repo
        uses: actions/checkout@v4
        with:
          repository: longhornrumble/lambda
          path: Lambdas/lambda
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Run npm audit (Picasso)
        working-directory: ./Picasso
        run: npm audit --omit=dev --audit-level=high

      - name: Run npm audit (Bedrock Lambda)
        working-directory: ./Lambdas/lambda/Bedrock_Streaming_Handler_Staging
        run: npm install --omit=dev --ignore-scripts && npm audit --omit=dev --audit-level=high

      - name: Run npm audit (Config Manager Lambda)
        working-directory: ./Lambdas/lambda/Picasso_Config_Manager
        run: npm install --omit=dev --ignore-scripts && npm audit --omit=dev --audit-level=high

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=Picasso/package.json
        continue-on-error: true

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Picasso'
          path: './Picasso'
          format: 'HTML'
        continue-on-error: true

      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            dependency-check-report.html
          retention-days: 30

  performance:
    name: Performance Evaluation
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Build production bundle
        working-directory: ./Picasso
        run: npm run build:production
        env:
          BUILD_ENV: production
          PICASSO_CONVERSATION_ENDPOINT: ${{ secrets.PICASSO_CONVERSATION_ENDPOINT }}

      - name: Validate no dev/staging Lambda URLs in production build
        working-directory: ./Picasso
        run: |
          DEV_URLS="2ho6tw56ccvl6uvicra4f56j740dyxgo\|7pluzq3axftklmb4gbgchfdahu0lcnqd"
          if grep -r "$DEV_URLS" dist/production/ 2>/dev/null; then
            echo "ERROR: Development/staging Lambda URLs found in production build"
            exit 1
          fi
          echo "OK: No dev/staging Lambda URLs in production build"

      - name: Analyze bundle size
        working-directory: ./Picasso
        run: |
          WIDGET_SIZE=$(stat -c%s "dist/production/widget.js" 2>/dev/null || stat -f%z "dist/production/widget.js")
          IFRAME_SIZE=$(stat -c%s "dist/production/iframe-main.js" 2>/dev/null || stat -f%z "dist/production/iframe-main.js")
          echo "Widget size: $((WIDGET_SIZE / 1024))KB"
          echo "Iframe size: $((IFRAME_SIZE / 1024))KB"

          # Fail if widget exceeds 25KB (gzipped should be ~6KB)
          if [ $WIDGET_SIZE -gt 25600 ]; then
            echo "ERROR: Widget size exceeds 25KB limit"
            exit 1
          fi

          # Fail if iframe exceeds 500KB (gzipped should be ~150KB)
          if [ $IFRAME_SIZE -gt 512000 ]; then
            echo "ERROR: Iframe size exceeds 500KB limit"
            exit 1
          fi

      - name: Run bundle analysis
        working-directory: ./Picasso
        run: npm run build:analyze
        env:
          ANALYZE: true
          BUILD_ENV: production

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: Picasso/dist/bundle-analysis.html
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # STAGING: Deploy to staging S3 for human testing
  # ─────────────────────────────────────────────────────────────────────
  build-and-deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security, performance]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Build staging bundle
        working-directory: ./Picasso
        run: npm run build:staging
        env:
          BUILD_ENV: staging
          PICASSO_STAGING_CONVERSATION_ENDPOINT: ${{ secrets.PICASSO_STAGING_CONVERSATION_ENDPOINT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to staging S3
        working-directory: ./Picasso
        run: |
          aws s3 sync dist/staging/ ${{ env.S3_BUCKET_STAGING }} \
            --exclude "*.map" \
            --exclude "collateral/*" \
            --exclude "tenants/*" \
            --cache-control "public, max-age=60" \
            --delete

      - name: Invalidate staging CloudFront
        if: env.CLOUDFRONT_STAGING_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_STAGING_ID }} \
            --paths '/*'

      - name: Post staging URL to summary
        run: |
          echo "## Staging Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Test at: **https://staging.chat.myrecruiter.ai**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use test tenant MYR384719 (hash \`my87674d777bf9\`)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "When testing is complete, approve the **Deploy to Production** step to continue." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────
  # MANUAL APPROVAL GATE: Human tests staging before production
  # ─────────────────────────────────────────────────────────────────────
  approve-production:
    name: Approve Production Deploy
    runs-on: ubuntu-latest
    needs: build-and-deploy-staging
    if: ${{ github.event.inputs.skip_staging != 'true' }}
    environment:
      name: production-approval
    steps:
      - name: Approval received
        run: |
          echo "## Production Deploy Approved" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Approved by: **${{ github.actor }}**" >> $GITHUB_STEP_SUMMARY
          echo "Proceeding to production deployment..." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────
  # PRODUCTION: Deploy to production S3 after approval
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build Production Bundle
    runs-on: ubuntu-latest
    needs: approve-production
    if: always() && (needs.approve-production.result == 'success' || github.event.inputs.skip_staging == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Build production bundle
        working-directory: ./Picasso
        run: npm run build:production
        env:
          BUILD_ENV: production
          PICASSO_CONVERSATION_ENDPOINT: ${{ secrets.PICASSO_CONVERSATION_ENDPOINT }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: Picasso/dist/production/
          retention-days: 30

  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://chat.myrecruiter.ai
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: Picasso/dist/production/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create backup of current production
        run: |
          BACKUP_DIR="backups/production-$(date +%Y%m%d-%H%M%S)"
          mkdir -p $BACKUP_DIR
          aws s3 sync ${{ env.S3_BUCKET_PRODUCTION }} $BACKUP_DIR --exclude "*.map" --exclude "collateral/*" --exclude "tenants/*"
          echo "BACKUP_DIR=$BACKUP_DIR" >> $GITHUB_ENV

      - name: Deploy to S3
        working-directory: ./Picasso
        run: |
          # Hashed assets (iframe-main.js, iframe-main.css, fonts/...) are
          # referenced from HTML with a build-bumped ?v=<hash> query string —
          # a fresh deploy yields fresh URLs, so 1-year immutable is safe.
          # Entry points (widget.js, iframe.html, *.html, go/index.html) have
          # no version in their URL — bound them to 5 min so a future
          # regression heals in minutes, not a year.
          aws s3 sync dist/production/ ${{ env.S3_BUCKET_PRODUCTION }} \
            --exclude "*.map" \
            --exclude "collateral/*" \
            --exclude "tenants/*" \
            --exclude "widget.js" \
            --exclude "iframe.html" \
            --exclude "test-staging.html" \
            --exclude "go/index.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          for f in widget.js iframe.html test-staging.html go/index.html; do
            aws s3 cp "dist/production/$f" "${{ env.S3_BUCKET_PRODUCTION }}$f" \
              --cache-control "public, max-age=300, must-revalidate"
          done

      - name: Verify protected files
        run: |
          if aws s3 ls ${{ env.S3_BUCKET_PRODUCTION }}collateral/MyRecruiterLogo.png; then
            echo "Protected files preserved"
          else
            echo "ERROR: Protected files missing!"
            exit 1
          fi

      - name: Invalidate CloudFront cache
        # Always invalidate on push-triggered deploys; allow opt-out only on manual dispatch.
        # Without this, the 1-year max-age on widget assets makes new code invisible to users
        # for up to a year. PR #48 (analytics fix) sat dormant in S3 for 20 minutes after
        # deploy until manually invalidated. PR #49 attempted this fix but on the wrong file
        # (Picasso/.github/workflows/, which is unused — this is the actual workflow file).
        if: github.event_name == 'push' || github.event.inputs.invalidate_cache != 'false'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths '/*'

      - name: Create deployment tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          TAG_NAME="deploy-production-$(date +%Y%m%d-%H%M%S)"
          git tag -a $TAG_NAME -m "Production deployment $TAG_NAME"
          git push origin $TAG_NAME

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Bucket**: ${{ env.S3_BUCKET_PRODUCTION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront**: https://chat.myrecruiter.ai" >> $GITHUB_STEP_SUMMARY
          echo "- **Backup**: ${{ env.BACKUP_DIR }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Rollback Instructions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "aws s3 sync ${{ env.BACKUP_DIR }}/ ${{ env.S3_BUCKET_PRODUCTION }} --delete --exclude 'collateral/*' --exclude 'tenants/*'" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Picasso Production Deployment ${{ needs.deploy.result }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Picasso Production Deployment"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ needs.deploy.result }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Actor:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "View deployment: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Send email notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "FAILED: Picasso Production Deployment"
          body: |
            Picasso production deployment FAILED.

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Actor: ${{ github.actor }}

            View details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.DEPLOYMENT_NOTIFY_EMAIL }}
          from: GitHub Actions
