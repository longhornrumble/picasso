name: Deploy to Production

on:
  # Push to main runs quality gates + the STAGING deploy only. The production
  # leg (approve-production → build → production-gate → deploy-production)
  # runs solely on workflow_dispatch, so prod deploys are deliberate acts and
  # merges never queue waiting-approval runs (CI-modernization Phase 0.3 —
  # the queue had grown to 21 ignored runs). Deploy mechanics live in the
  # reusable deploy-frontend.yml (Phase 2.1); quality gates + builds stay here.
  push:
    branches:
      - main
    paths-ignore:
      # Docs-only changes don't affect the widget build artifact — skip the
      # workflow entirely for them.
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      invalidate_cache:
        description: 'Invalidate CloudFront cache after deployment'
        required: false
        type: boolean
        default: false
      skip_staging:
        description: 'Skip staging and deploy directly to production (hotfix only)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '22'
  AWS_REGION: 'us-east-1'

jobs:
  lint:
    name: Code Quality - Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Run linting
        working-directory: ./Picasso
        run: npm run lint

      - name: Upload lint results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: lint-results
          path: Picasso/eslint-report.json
          retention-days: 7

  typecheck:
    name: Code Quality - Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Run type checking
        working-directory: ./Picasso
        run: npm run typecheck

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Run tests
        working-directory: ./Picasso
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        with:
          files: ./Picasso/coverage/lcov.info
          flags: frontend
          name: picasso-frontend

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: test-results
          path: |
            Picasso/coverage/
            Picasso/test-results.xml
          retention-days: 30

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Checkout Lambda repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: longhornrumble/lambda
          path: Lambdas/lambda
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Run npm audit (Picasso)
        working-directory: ./Picasso
        run: npm audit --omit=dev --audit-level=high

      - name: Run npm audit (Bedrock Lambda)
        working-directory: ./Lambdas/lambda/Bedrock_Streaming_Handler_Staging
        run: npm install --omit=dev --ignore-scripts && npm audit --omit=dev --audit-level=high

      - name: Run npm audit (Config Manager Lambda)
        working-directory: ./Lambdas/lambda/Picasso_Config_Manager
        run: npm install --omit=dev --ignore-scripts && npm audit --omit=dev --audit-level=high

      - name: Run Snyk security scan
        uses: snyk/actions/node@9cf6ca713d71123d2d229cc3d7f145b96ea3c518  # master tip 2026-05-24
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=Picasso/package.json
        continue-on-error: true

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c  # main tip 2026-05-24
        with:
          project: 'Picasso'
          path: './Picasso'
          format: 'HTML'
        continue-on-error: true

      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: security-scan-results
          path: |
            dependency-check-report.html
          retention-days: 30

  performance:
    name: Performance Evaluation
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Build production bundle
        working-directory: ./Picasso
        run: npm run build:production
        env:
          BUILD_ENV: production
          PICASSO_CONVERSATION_ENDPOINT: ${{ secrets.PICASSO_CONVERSATION_ENDPOINT }}

      - name: Validate no dev/staging Lambda URLs in production build
        working-directory: ./Picasso
        run: |
          DEV_URLS="2ho6tw56ccvl6uvicra4f56j740dyxgo\|7pluzq3axftklmb4gbgchfdahu0lcnqd"
          if grep -r "$DEV_URLS" dist/production/ 2>/dev/null; then
            echo "ERROR: Development/staging Lambda URLs found in production build"
            exit 1
          fi
          echo "OK: No dev/staging Lambda URLs in production build"

      - name: Analyze bundle size
        working-directory: ./Picasso
        run: |
          WIDGET_SIZE=$(stat -c%s "dist/production/widget.js" 2>/dev/null || stat -f%z "dist/production/widget.js")
          IFRAME_SIZE=$(stat -c%s "dist/production/iframe-main.js" 2>/dev/null || stat -f%z "dist/production/iframe-main.js")
          echo "Widget size: $((WIDGET_SIZE / 1024))KB"
          echo "Iframe size: $((IFRAME_SIZE / 1024))KB"

          # Fail if widget exceeds 25KB (gzipped should be ~6KB)
          if [ $WIDGET_SIZE -gt 25600 ]; then
            echo "ERROR: Widget size exceeds 25KB limit"
            exit 1
          fi

          # Fail if iframe exceeds 500KB (gzipped should be ~150KB)
          if [ $IFRAME_SIZE -gt 512000 ]; then
            echo "ERROR: Iframe size exceeds 500KB limit"
            exit 1
          fi

      - name: Run bundle analysis
        working-directory: ./Picasso
        run: npm run build:analyze
        env:
          ANALYZE: true
          BUILD_ENV: production

      - name: Upload bundle analysis
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: bundle-analysis
          path: Picasso/dist/bundle-analysis.html
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # STAGING: Build, then deploy via the reusable workflow (Phase 2.1)
  # ─────────────────────────────────────────────────────────────────────
  build-staging:
    name: Build Staging Bundle
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security, performance]
    # Hotfix dispatches (skip_staging=true) really do skip the staging deploy
    # now — previously the flag only skipped the approval pause while staging
    # still deployed (Phase 0 audit SR-1). Quality gates still run on every
    # path; a hotfix must pass tests too.
    if: ${{ github.event.inputs.skip_staging != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Build staging bundle
        working-directory: ./Picasso
        run: npm run build:staging
        env:
          BUILD_ENV: staging
          PICASSO_STAGING_CONVERSATION_ENDPOINT: ${{ secrets.PICASSO_STAGING_CONVERSATION_ENDPOINT }}

      - name: Upload staging build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: staging-build
          path: Picasso/dist/staging/
          retention-days: 7

      - name: Testing guidance to summary
        run: |
          echo "## Staging Build Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy job follows; test at: **https://staging.chat.myrecruiter.ai**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use test tenant MYR384719 (hash \`my87674d777bf9\`)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # The approval step only exists on dispatch runs — on push the prod
          # leg is skipped by design, so don't tell the operator to wait for
          # an approval UI that will never appear (Phase 0 audit N-1).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "When testing is complete, approve the **Deploy to Production** step to continue." >> $GITHUB_STEP_SUMMARY
          else
            echo "Push-triggered run: production deploy is dispatch-only (run **Deploy to Production** manually to promote)." >> $GITHUB_STEP_SUMMARY
          fi

  deploy-staging:
    name: Deploy to Staging
    needs: build-staging
    permissions:
      id-token: write        # OIDC role assumption (reusable caller contract)
      contents: read         # artifact download
    # Local-path reference: runs the reusable from the SAME commit as this
    # caller, so the two files can never skew.
    uses: ./.github/workflows/deploy-frontend.yml
    with:
      environment: staging
      artifact_name: staging-build
      bucket: picasso-widget-staging
      # staging.chat.myrecruiter.ai distribution (staging acct 525); was the
      # CLOUDFRONT_STAGING_DISTRIBUTION_ID secret — distribution ids aren't
      # secret, and the staging deploy role's invalidation grant is pinned to
      # exactly this id.
      cloudfront_distribution_id: E3G30AUOEJTB36
      website_url: https://staging.chat.myrecruiter.ai
      smoke_path: /widget.js
      cache_control: 'public, max-age=60'
      sync_exclude: '*.map collateral/* tenants/*'
    secrets:
      # Q5 Phase 2: staging-account widget-deploy role (picasso-widget-deploy-staging).
      # Distinct from the prod-account AWS_DEPLOY_ROLE_ARN used by the prod leg.
      deploy_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}

  # ─────────────────────────────────────────────────────────────────────
  # MANUAL APPROVAL GATE: Human tests staging before production
  # ─────────────────────────────────────────────────────────────────────
  approve-production:
    name: Approve Production Deploy
    runs-on: ubuntu-latest
    needs: deploy-staging
    # Production leg is dispatch-only (see `on:` comment). On push this job is
    # skipped, which cascades: build + deploy skip too (their `if` requires
    # approve-production success or the dispatch-only skip_staging input).
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_staging != 'true' }}
    environment:
      name: production-approval
    steps:
      - name: Approval received
        run: |
          echo "## Production Deploy Approved" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Approved by: **${{ github.actor }}**" >> $GITHUB_STEP_SUMMARY
          echo "Proceeding to production deployment..." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────
  # PRODUCTION: Deploy to production S3 after approval
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build Production Bundle
    runs-on: ubuntu-latest
    # Gate jobs listed in needs so the hotfix path (skip_staging=true, which
    # skips staging AND the approval job) still requires green gates — without
    # them, always() would let a hotfix build proceed over failed tests
    # (pre-existing hole, closed with Phase 0 audit SR-1).
    needs: [approve-production, lint, typecheck, test, security]
    if: >-
      always() &&
      needs.lint.result == 'success' &&
      needs.typecheck.result == 'success' &&
      needs.test.result == 'success' &&
      needs.security.result == 'success' &&
      (needs.approve-production.result == 'success' || github.event.inputs.skip_staging == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Picasso/package-lock.json'

      - name: Install dependencies
        working-directory: ./Picasso
        run: npm ci

      - name: Build production bundle
        working-directory: ./Picasso
        run: npm run build:production
        env:
          BUILD_ENV: production
          PICASSO_CONVERSATION_ENDPOINT: ${{ secrets.PICASSO_CONVERSATION_ENDPOINT }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: production-build
          path: Picasso/dist/production/
          retention-days: 30

  # Reusable-caller jobs can't carry `environment:` — this gate job holds the
  # `production` environment (same pattern as config-builder's
  # approve-production gate-job, Phase 2 wave 1).
  production-gate:
    name: Production Gate
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://chat.myrecruiter.ai
    steps:
      - name: Gate passed
        run: echo "Production deploy approved by **${{ github.actor }}**" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    name: Deploy to Production
    needs: production-gate
    permissions:
      id-token: write        # OIDC role assumption (reusable caller contract)
      contents: read         # artifact download
    uses: ./.github/workflows/deploy-frontend.yml
    with:
      environment: production
      artifact_name: production-build
      bucket: picassocode
      # chat.myrecruiter.ai distribution; was the CLOUDFRONT_DISTRIBUTION_ID
      # secret. Invalidation remains opt-in on dispatch (prod leg is
      # dispatch-only): unchecked = skip, and the 5-min Cache-Control on the
      # entry points heals within minutes.
      cloudfront_distribution_id: ${{ github.event.inputs.invalidate_cache != 'false' && 'E3G0LSWB1AQ9LP' || '' }}
      website_url: https://chat.myrecruiter.ai
      smoke_path: /widget.js
      # Hashed assets (iframe-main.js, iframe-main.css, fonts/...) are
      # referenced from HTML with a build-bumped ?v=<hash> query string —
      # fresh deploy = fresh URLs, so 1-year immutable is safe. Entry points
      # (short_cache_paths) have no version in their URL — bound to 5 min so
      # a regression heals in minutes, not a year (the PR #48 incident).
      cache_control: 'public, max-age=31536000, immutable'
      short_cache_paths: 'widget.js iframe.html test-staging.html go/index.html'
      short_cache_control: 'public, max-age=300, must-revalidate'
      sync_exclude: '*.map collateral/* tenants/*'
    secrets:
      deploy_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

  post-deploy:
    name: Verify + Tag
    runs-on: ubuntu-latest
    needs: deploy-production
    permissions:
      id-token: write
      contents: write        # pushes the deploy-production-* tag
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify protected files
        run: |
          if aws s3 ls s3://picassocode/collateral/MyRecruiterLogo.png; then
            echo "Protected files preserved"
          else
            echo "ERROR: Protected files missing!"
            exit 1
          fi

      # prod-staleness-check.yml diffs Picasso/ since the newest
      # deploy-production-* tag — this tag is load-bearing, keep it on every
      # successful prod deploy.
      - name: Create deployment tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          TAG_NAME="deploy-production-$(date +%Y%m%d-%H%M%S)"
          git tag -a $TAG_NAME -m "Production deployment $TAG_NAME"
          git push origin $TAG_NAME

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy-production
    # Only notify when a production deploy actually ran. Without the guard,
    # every push to main Slacks "Production Deployment skipped" — pure noise
    # that desensitizes the operator (Phase 0 audit SR-2).
    if: always() && needs.deploy-production.result != 'skipped'
    steps:
      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@fcfb566f8b0aab22203f066d80ca1d7e4b5d05b3  # v1
        with:
          payload: |
            {
              "text": "Picasso Production Deployment ${{ needs.deploy-production.result }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Picasso Production Deployment"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ needs.deploy-production.result }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Actor:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "View deployment: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Send email notification
        if: failure()
        uses: dawidd6/action-send-mail@4226df7daafa6fc901a43789c49bf7ab309066e7  # v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "FAILED: Picasso Production Deployment"
          body: |
            Picasso production deployment FAILED.

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Actor: ${{ github.actor }}

            View details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.DEPLOYMENT_NOTIFY_EMAIL }}
          from: GitHub Actions
