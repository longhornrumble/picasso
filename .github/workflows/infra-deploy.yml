name: Terraform Infrastructure (staging)

# Triggered by:
#   - push to `main` touching infra/ -> AUTO-APPLY the change to staging on merge
#     (the PR's plan comment is the review gate; no manual step). This is the
#     normal path: open an infra PR, review the plan, merge, it applies.
#   - push to the `staging` branch touching infra/ -> apply (legacy path, kept).
#   - manual workflow_dispatch -> apply (against the chosen ref, default `main`)
#     — for re-applying or applying a feature branch to staging out-of-band.
#   - any PR touching infra/ -> PLAN only (posted as a PR comment).
# EVERY apply path targets the STAGING account (backend/staging.tfbackend +
# envs/staging.tfvars + the staging deploy role) — this workflow does NOT touch
# prod (prod infra is a separate, deliberately gated workflow).
on:
  push:
    branches: [main, staging]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-deploy.yml'
  workflow_dispatch: {}
  pull_request:
    branches: [main, staging]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-deploy.yml'

permissions:
  id-token: write    # OIDC token for assume-role
  contents: read
  pull-requests: write  # post plan output on PRs

# Phase-1 audit Row 11: serialize ALL runs of this workflow (plan + apply)
# against the shared staging TF backend. cancel-in-progress:false so a
# mid-flight `terraform apply` is never killed — runs queue instead. Prevents
# the shared-`staging`-branch race that the 4 failed Q5 applies exposed.
concurrency:
  group: terraform-infra-staging
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform plan/apply (staging)
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: 1.15.1

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform fmt + validate
        run: |
          terraform fmt -check -recursive
          terraform init -reconfigure -backend-config=backend/staging.tfbackend
          terraform validate

      - name: Terraform plan
        if: github.event_name == 'pull_request'
        id: plan
        # Q5 Apply 2: the two distinct x-picasso-cf-origin values are
        # non-committed sensitive vars. Supplied here from staging-environment
        # secrets the operator must create before this plan renders clean.
        # Terraform marks them sensitive — never printed in the plan comment.
        # Meta Messenger: MESSENGER_VERIFY_TOKEN follows the same pattern —
        # staging-environment secret, sensitive, no default.
        env:
          TF_VAR_q5_mfs_cf_origin_secret: ${{ secrets.Q5_MFS_CF_ORIGIN_SECRET }}
          TF_VAR_q5_streaming_cf_origin_secret: ${{ secrets.Q5_STREAMING_CF_ORIGIN_SECRET }}
          TF_VAR_messenger_verify_token: ${{ secrets.MESSENGER_VERIFY_TOKEN }}
          TF_VAR_github_promote_token: ${{ secrets.CONFIG_PROMOTE_TOKEN }}
        run: |
          terraform plan -var-file=envs/staging.tfvars -no-color -out=plan.tfplan 2>&1 | tee /tmp/plan.txt
          # `| tee` makes the pipeline exit 0 even when terraform exits non-zero,
          # which let a failing plan (e.g. the Q5 cf-origin variable-validation
          # gate rejecting a missing secret) show a GREEN check. Propagate
          # terraform's real exit code so a failing plan fails the job.
          exit "${PIPESTATUS[0]}"

      - name: Comment plan on PR
        # always() so a FAILED plan (e.g. the cf-origin validation gate) still
        # posts its actionable error to the PR instead of only a red check.
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const fs = require('fs');
            // Phase-1 audit Row 12: the plan step can fail BEFORE writing
            // /tmp/plan.txt (init/auth failure). Guard so this step surfaces
            // that instead of throwing an opaque ENOENT and eating the cause.
            let body;
            if (fs.existsSync('/tmp/plan.txt')) {
              const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
              const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n... (truncated)' : plan;
              body = '### Terraform plan (staging)\n```\n' + truncated + '\n```';
            } else {
              body = '### Terraform plan (staging)\n⚠️ The plan step failed before producing output (likely `terraform init`/credentials). See the failed job logs.';
            }
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Terraform apply
        if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')) || github.event_name == 'workflow_dispatch'
        env:
          TF_VAR_q5_mfs_cf_origin_secret: ${{ secrets.Q5_MFS_CF_ORIGIN_SECRET }}
          TF_VAR_q5_streaming_cf_origin_secret: ${{ secrets.Q5_STREAMING_CF_ORIGIN_SECRET }}
          TF_VAR_messenger_verify_token: ${{ secrets.MESSENGER_VERIFY_TOKEN }}
          TF_VAR_github_promote_token: ${{ secrets.CONFIG_PROMOTE_TOKEN }}
        run: terraform apply -var-file=envs/staging.tfvars -auto-approve

      # Defense-in-depth post-apply guard (origin: 2026-05-26 row #22).
      # NOTE: the originally-suspected "IaC overwrites the Lambda on policy
      # change" mechanism was DISPROVEN 2026-05-29 (see verify-dsar-codesha.sh
      # header + the module's row-#22 comment — terraform plan proves policy
      # changes don't touch the function and ignore_changes holds). This check
      # is retained for the genuine residual: a function force-replacement or a
      # wrong-zip manual deploy leaving inert code running. Red status alerts
      # the operator to re-deploy the known-good zip.
      - name: DSAR Lambda regression check
        if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')) || github.event_name == 'workflow_dispatch'
        run: ../tools/verify-dsar-codesha.sh
        continue-on-error: true  # Detection only — staging apply success is
                                  # still meaningful. The Lambda re-deploy is
                                  # a separate operator action; this job's
                                  # red status alerts the operator to it.
