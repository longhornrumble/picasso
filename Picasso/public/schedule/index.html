<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="robots" content="noindex">
  <title>Schedule</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #f5f7f6; }
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    #fullpage-iframe { width: 100%; height: 100%; border: none; display: block; }
    .error-container, .loading-container {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; padding: 2rem; text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .error-container h1 { color: #1f2937; font-size: 1.5rem; margin-bottom: 1rem; }
    .error-container p, .loading-text { color: #6b7280; font-size: 1rem; }
    .loading-spinner {
      width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #1f9d6b;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 1rem; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div id="loading-container" class="loading-container">
    <div class="loading-spinner"></div>
    <p class="loading-text">Loading…</p>
  </div>

  <div id="error-container" class="error-container" style="display: none;">
    <h1>Link not available</h1>
    <p>This scheduling link appears to be invalid or expired.</p>
  </div>

  <!-- Externalized to launcher.js so a strict CSP (script-src 'self') can be enforced. -->
  <script src="./launcher.js"></script>
</body>
</html>
